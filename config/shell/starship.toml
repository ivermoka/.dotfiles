# Editor completions
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = "$directory$character"

[directory]
truncate_to_repo = true
format = "[ $path ](bold blue)"

[character]
success_symbol = "[\\$](green)"
error_symbol = "[\\$](red)"

[git_branch]
disabled = true

[git_status]
disabled = true

[battery]
disabled = true

[cmd_duration]
disabled = true

[package]
disabled = true

# Dracula theme
palette = "dracula"

[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

